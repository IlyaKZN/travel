services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: travels
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: travels
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travels -d travels']
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  pgdata:
