name: Deploy to production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=0
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::Secret SSH_HOST is not set (Settings → Secrets and variables → Actions)"
            missing=1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "::error::Secret SSH_USER is not set (e.g. root)"
            missing=1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Secret SSH_PRIVATE_KEY is not set (contents of deploy/github-actions-deploy)"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -avz \
            --exclude .git \
            --exclude node_modules \
            --exclude server/node_modules \
            --exclude dist \
            --exclude server/dist \
            --exclude server/.env \
            ./ "${SSH_USER}@${SSH_HOST}:/opt/travels/"

      - name: Build and restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" \
            'chmod +x /opt/travels/deploy/deploy.sh && bash /opt/travels/deploy/deploy.sh'
